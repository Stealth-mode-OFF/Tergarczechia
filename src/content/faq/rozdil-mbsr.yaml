question: Jaký je rozdíl mezi Joy of Living a Mindfulness/MBSR?
answer: |
  MBSR (Mindfulness-Based Stress Reduction) je sekulární 8-týdenní program, který čerpá z buddhistických technik ale je striktně bez buddhistického kontextu. Joy of Living sdílí mnoho základních technik, ale je **komplexnější** — zahrnuje i práci se soucitem a vhledem, a otevírá cestu k pokročilé buddhistické praxi pro ty, kdo ji chtějí. Pokud hledáte čistě terapeutický/sekulární program, MBSR může být lepší. Pokud jste otevření hlubšímu zkoumání mysli, Joy of Living nabídne víc.
section: programy
order: 5

question: Kolik času denně by měl člověk meditovat?
answer: |
  Začít stačí **10 minut denně**. Důležitější než délka je pravidelnost. Mingyur Rinpočhe říká: „Raději 5 minut každý den, než hodina jednou týdně." Po několika týdnech si mysl zvykne a čas se přirozeně prodlouží, pokud to člověk cítí.
section: meditace
order: 4

question: Kolik stojí účast?
answer: |
  Pravidelná týdenní setkání skupin jsou **zdarma** (případně s dobrovolným příspěvkem na pronájem). Strukturované kurzy a retreaty jsou placené — ceny se liší podle rozsahu, typicky 500–3 000 Kč za víkend. Nikdo nemá být vyloučen kvůli financím — pokud si nemůžete dovolit, napište nám, řešíme to individuálně.

question: Potřebuji chodit na skupinu, nebo stačí doma?
answer: |
  Obojí má své místo. Domácí praxe je základem — bez ní se skupina stane jen zábavou. Skupina ale poskytuje podporu, pravidelnost a prostředí, ve kterém se praxe prohlubuje jinak než o samotě. Doporučujeme: praktikujte doma co nejvíce, a chodit na skupinu jednou za 1–2 týdny jako „kotvu".
section: meditace
order: 8

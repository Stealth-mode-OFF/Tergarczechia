question: Musím být buddhista?
answer: |
  Ne. Úvodní program Joy of Living je sekulární — využívá techniky z buddhistické tradice, ale nevyžaduje žádnou víru ani přijetí buddhistických konceptů. Pokročilejší programy (Path of Liberation) už jsou explicitně buddhistické, ale i tam jste vítáni bez ohledu na vyznání.

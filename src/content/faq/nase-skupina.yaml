question: Jak vypadá typické setkání skupiny?
answer: |
  Setkání trvá obvykle 90 minut. Začíná krátkým úvodem a povídáním o tématu (~15 min), následuje vedená meditace (~30 min) a diskusní kruh s prostorem pro otázky a sdílení (~30–45 min). Atmosféra je uvolněná. Nemusíte nic říkat, pokud nechcete. Přijít můžete kdykoliv, i na první setkání bez přihlášení.

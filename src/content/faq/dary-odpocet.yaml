question: Můžu si dar na Tergar Česko odečíst z daní?
answer: |
  Ano. Tergar Česko je registrovaná nezisková organizace a vystavujeme potvrzení pro daňové účely. Můžete si odečíst až 15 % ze základu daně (fyzické osoby) nebo 10 % (právnické osoby). Pokud darujete přes darujme.cz, potvrzení vystavují automaticky.
